name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" "Django==5.2.*"
      - name: Run lint
        run: ruff check src tests examples .github
      - name: Run typing
        run: mypy src
      - name: Build package
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
  test:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.11"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.13"
            django-version: "5.2"
            run-coverage: true
          - python-version: "3.14"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "6.0"
          - python-version: "3.13"
            django-version: "6.0"
          - python-version: "3.14"
            django-version: "6.0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" "Django==${{ matrix.django-version }}.*"
      - name: Run tests
        run: |
          if [ "${{ matrix.run-coverage || 'false' }}" = "true" ]; then
            pytest --cov=django_bizcal --cov-report=term-missing
          else
            pytest
          fi
